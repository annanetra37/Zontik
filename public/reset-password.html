<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Reset Password — Zontik</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Fraunces:ital,wght@1,600&display=swap" rel="stylesheet" />
<style>
  :root { --accent: #7c6ff0; --bg: #f7f5ff; --ink: #1a1a2e; --ink-soft: #9896b0; --border: #e8e6f0; --surface: #fff; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg);
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
    padding: 2rem;
  }
  .card {
    background: var(--surface); border-radius: 1.2rem; padding: 2.5rem;
    max-width: 420px; width: 100%; box-shadow: 0 8px 32px rgba(0,0,0,0.08);
    border: 1.5px solid var(--border);
  }
  .logo {
    font-family: 'Fraunces', serif; font-style: italic; font-size: 1.5rem;
    font-weight: 600; color: var(--accent); text-align: center; margin-bottom: 1.5rem;
    text-decoration: none; display: block;
  }
  h2 { font-size: 1.3rem; font-weight: 700; color: var(--ink); margin-bottom: 0.5rem; }
  p { color: var(--ink-soft); font-size: 0.88rem; margin-bottom: 1.2rem; }
  label { font-size: 0.82rem; font-weight: 600; color: var(--ink); display: block; margin-bottom: 0.3rem; }
  .req { color: #d9363e; }
  .form-group { margin-bottom: 0.75rem; }
  input {
    width: 100%; padding: 0.6rem 0.9rem; border: 1.5px solid var(--border);
    border-radius: 0.6rem; font-family: inherit; font-size: 0.9rem;
    color: var(--ink); transition: border-color 0.2s;
  }
  input:focus { outline: none; border-color: var(--accent); }
  .password-wrap { position: relative; display: flex; }
  .password-wrap input { flex: 1; padding-right: 2.8rem; }
  .pw-toggle {
    position: absolute; right: 0.5rem; top: 50%; transform: translateY(-50%);
    background: none; border: none; cursor: pointer; font-size: 1rem; opacity: 0.5;
  }
  .pw-toggle:hover { opacity: 0.8; }
  .btn {
    width: 100%; padding: 0.7rem; background: var(--accent); color: #fff;
    border: none; border-radius: 0.6rem; font-family: inherit;
    font-size: 0.92rem; font-weight: 700; cursor: pointer;
    transition: background 0.15s; margin-top: 0.5rem;
  }
  .btn:hover { background: #6a5cd8; }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .error-banner {
    background: #fef2f2; border: 1px solid #fecaca; border-radius: 0.6rem;
    padding: 0.6rem 1rem; color: #b91c1c; font-size: 0.82rem; font-weight: 500;
    margin-bottom: 1rem; display: none;
  }
  .success { text-align: center; }
  .success h3 { margin-bottom: 0.75rem; color: var(--ink); }
  .success p { color: var(--ink-soft); }
  .back-link { display: block; text-align: center; margin-top: 1.2rem; color: var(--accent); font-weight: 600; font-size: 0.88rem; text-decoration: none; }
  .back-link:hover { text-decoration: underline; }
</style>
</head>
<body>
<div class="card">
  <a href="/" class="logo">Zon<span style="color:#ff3dac;margin:0 -9px">Ց</span>ik</a>
  <div id="formArea">
    <h2>Set New Password</h2>
    <p>Enter your new password below.</p>
    <div class="error-banner" id="errorBanner"></div>
    <div class="form-group">
      <label>New Password <span class="req">*</span></label>
      <div class="password-wrap">
        <input type="password" id="newPassword" placeholder="Min. 6 characters" />
        <button type="button" class="pw-toggle" id="toggleBtn" title="Show password">👁</button>
      </div>
    </div>
    <div class="form-group">
      <label>Confirm Password <span class="req">*</span></label>
      <div class="password-wrap">
        <input type="password" id="confirmPassword" placeholder="Re-enter password" />
      </div>
    </div>
    <button class="btn" id="submitBtn">Reset Password</button>
  </div>
  <a href="/" class="back-link">Back to Zontik</a>
</div>

<script>
  const token = new URLSearchParams(window.location.search).get('token');
  if (!token) {
    document.getElementById('formArea').innerHTML =
      '<div class="success"><h3>Invalid Link</h3><p>This password reset link is invalid or has expired.</p></div>';
  }

  document.getElementById('toggleBtn')?.addEventListener('click', function() {
    const inp = document.getElementById('newPassword');
    if (inp.type === 'password') { inp.type = 'text'; this.textContent = '🙈'; }
    else { inp.type = 'password'; this.textContent = '👁'; }
  });

  document.getElementById('submitBtn')?.addEventListener('click', async function() {
    const err = document.getElementById('errorBanner');
    err.style.display = 'none';
    const pw = document.getElementById('newPassword').value;
    const confirm = document.getElementById('confirmPassword').value;
    if (!pw || !confirm) { err.textContent = 'Please fill in both fields'; err.style.display = 'block'; return; }
    if (pw.length < 6) { err.textContent = 'Password must be at least 6 characters'; err.style.display = 'block'; return; }
    if (pw !== confirm) { err.textContent = 'Passwords do not match'; err.style.display = 'block'; return; }
    this.disabled = true; this.textContent = 'Resetting...';
    try {
      const res = await fetch('/api/auth/reset-password', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ token, password: pw })
      });
      const data = await res.json();
      if (!res.ok) { err.textContent = data.error || 'Something went wrong'; err.style.display = 'block'; this.disabled = false; this.textContent = 'Reset Password'; return; }
      document.getElementById('formArea').innerHTML =
        '<div class="success">' +
        '<div style="font-size:2.5rem;margin-bottom:1rem">✅</div>' +
        '<h3>Password Reset!</h3>' +
        '<p>Your password has been updated. You can now log in with your new password.</p>' +
        '<a href="/" class="btn" style="display:block;text-align:center;text-decoration:none;margin-top:1rem">Go to Zontik</a></div>';
    } catch {
      err.textContent = 'Network error — please try again'; err.style.display = 'block';
      this.disabled = false; this.textContent = 'Reset Password';
    }
  });
</script>
</body>
</html>
